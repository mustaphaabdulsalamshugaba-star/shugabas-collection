<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>

.login-box{
max-width:400px;
margin:100px auto;
padding:30px;
background:#111;
border:2px solid gold;
border-radius:10px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
padding:12px 20px;
background:gold;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email">

<input type="password" id="password" placeholder="Password">

<button onclick="adminLogin()">
Login
</button>

</div>

<script type="module" src="admin-login.js"></script>

</body>
</html>
